<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <span class="logo-icon">📋</span>
                </div>
                <h1>Gerenciador de Tarefas</h1>
                <p class="login-subtitle">Organize suas tarefas com metodologias ágeis</p>
            </div>
            
            <div class="login-tabs">
                <button class="tab-btn active" data-tab="login">Entrar</button>
                <button class="tab-btn" data-tab="register">Criar Conta</button>
            </div>
            
            <!-- Formulário de Login -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="Sua senha" required autocomplete="current-password">
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me">
                        <span>Lembrar de mim</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary btn-full">Entrar</button>
                <div id="login-error" class="form-error"></div>
            </form>
            
            <!-- Formulário de Cadastro -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-name">Nome completo</label>
                    <input type="text" id="register-name" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Senha</label>
                    <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="register-confirm">Confirmar senha</label>
                    <input type="password" id="register-confirm" placeholder="Repita a senha" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Criar Conta</button>
                <div id="register-error" class="form-error"></div>
            </form>
            
            <div class="login-divider">
                <span>ou</span>
            </div>
            
            <button id="google-login-btn" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                    <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                    <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                    <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                </svg>
                <span>Entrar com Google</span>
            </button>
            
            <div id="google-error" class="form-error"></div>
        </div>
        
        <div class="login-footer">
            <p>© 2026 Gerenciador de Tarefas. Todos os direitos reservados.</p>
        </div>
    </div>
    
    <script src="scripts/modules/db/database.js"></script>
    <script src="scripts/modules/auth/auth.js"></script>
    <script src="scripts/login.js"></script>
</body>
</html>
