<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas - Task Management PRO</title>
    
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }

        .task-form {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .tasks-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .task-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-item.completed {
            opacity: 0.6;
            border-left-color: #28a745;
        }

        .task-item.priority-high {
            border-left-color: #dc3545;
        }

        .task-item.priority-medium {
            border-left-color: #ffc107;
        }

        .task-item.priority-low {
            border-left-color: #28a745;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .task-meta {
            font-size: 0.9em;
            color: #666;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .task-actions button {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-complete {
            background: #28a745;
            color: white;
        }

        .btn-edit {
            background: #ffc107;
            color: #333;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-actions {
                margin-top: 10px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Gerenciador de Tarefas</h1>
            <p>Task Management PRO</p>
        </header>

        <div class="dashboard">
            <div class="stat-card">
                <h3>Total de Tarefas</h3>
                <div class="number" id="total-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>Pendentes</h3>
                <div class="number" id="pending-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>Concluídas</h3>
                <div class="number" id="completed-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>Alta Prioridade</h3>
                <div class="number" id="high-priority-tasks">0</div>
            </div>
        </div>

        <div class="task-form">
            <h2>➕ Adicionar Nova Tarefa</h2>
            <form id="add-task-form">
                <div class="form-group">
                    <label for="task-title">Título da Tarefa</label>
                    <input type="text" id="task-title" required placeholder="Digite o título da tarefa">
                </div>
                <div class="form-group">
                    <label for="task-description">Descrição</label>
                    <textarea id="task-description" rows="3" placeholder="Digite a descrição (opcional)"></textarea>
                </div>
                <div class="form-group">
                    <label for="task-priority">Prioridade</label>
                    <select id="task-priority">
                        <option value="low">Baixa</option>
                        <option value="medium">Média</option>
                        <option value="high">Alta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-due-date">Data de Vencimento</label>
                    <input type="date" id="task-due-date">
                </div>
                <button type="submit" class="btn">Adicionar Tarefa</button>
            </form>
        </div>

        <div class="tasks-container">
            <h2>📝 Minhas Tarefas</h2>
            <div class="task-filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendentes</button>
                <button class="filter-btn" data-filter="completed">Concluídas</button>
                <button class="filter-btn" data-filter="high">Alta Prioridade</button>
            </div>
            <ul class="task-list" id="task-list">
                <div class="empty-state">
                    <p>Nenhuma tarefa adicionada ainda.</p>
                    <p>Comece adicionando sua primeira tarefa acima! 🚀</p>
                </div>
            </ul>
        </div>
    </div>

    <script>
        // Task Manager Application
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentFilter = 'all';
                this.init();
            }

            init() {
                this.updateStats();
                this.renderTasks();
                this.attachEventListeners();
            }

            loadTasks() {
                const saved = localStorage.getItem('tasks');
                return saved ? JSON.parse(saved) : [];
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            addTask(task) {
                const newTask = {
                    id: Date.now(),
                    ...task,
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                this.tasks.push(newTask);
                this.saveTasks();
                this.updateStats();
                this.renderTasks();
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(task => task.id !== id);
                this.saveTasks();
                this.updateStats();
                this.renderTasks();
            }

            toggleComplete(id) {
                const task = this.tasks.find(task => task.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.updateStats();
                    this.renderTasks();
                }
            }

            updateStats() {
                const total = this.tasks.length;
                const pending = this.tasks.filter(t => !t.completed).length;
                const completed = this.tasks.filter(t => t.completed).length;
                const highPriority = this.tasks.filter(t => t.priority === 'high' && !t.completed).length;

                document.getElementById('total-tasks').textContent = total;
                document.getElementById('pending-tasks').textContent = pending;
                document.getElementById('completed-tasks').textContent = completed;
                document.getElementById('high-priority-tasks').textContent = highPriority;
            }

            getFilteredTasks() {
                switch(this.currentFilter) {
                    case 'pending':
                        return this.tasks.filter(t => !t.completed);
                    case 'completed':
                        return this.tasks.filter(t => t.completed);
                    case 'high':
                        return this.tasks.filter(t => t.priority === 'high');
                    default:
                        return this.tasks;
                }
            }

            renderTasks() {
                const taskList = document.getElementById('task-list');
                const filteredTasks = this.getFilteredTasks();

                if (filteredTasks.length === 0) {
                    taskList.innerHTML = '<div class="empty-state"><p>Nenhuma tarefa encontrada.</p></div>';
                    return;
                }

                taskList.innerHTML = filteredTasks.map(task => `
                    <li class="task-item ${task.completed ? 'completed' : ''} priority-${task.priority}">
                        <div class="task-content">
                            <div class="task-title">${task.title}</div>
                            <div class="task-meta">
                                ${task.description ? `<div>${task.description}</div>` : ''}
                                <div>Prioridade: ${this.getPriorityLabel(task.priority)} | 
                                ${task.dueDate ? `Vencimento: ${this.formatDate(task.dueDate)}` : 'Sem prazo'}</div>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="btn-complete" onclick="taskManager.toggleComplete(${task.id})">
                                ${task.completed ? '↩️ Reabrir' : '✓ Concluir'}
                            </button>
                            <button class="btn-delete" onclick="taskManager.deleteTask(${task.id})">
                                🗑️ Excluir
                            </button>
                        </div>
                    </li>
                `).join('');
            }

            getPriorityLabel(priority) {
                const labels = {
                    low: '🟢 Baixa',
                    medium: '🟡 Média',
                    high: '🔴 Alta'
                };
                return labels[priority] || priority;
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleDateString('pt-BR');
            }

            attachEventListeners() {
                // Form submission
                document.getElementById('add-task-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const task = {
                        title: document.getElementById('task-title').value,
                        description: document.getElementById('task-description').value,
                        priority: document.getElementById('task-priority').value,
                        dueDate: document.getElementById('task-due-date').value
                    };

                    this.addTask(task);
                    e.target.reset();
                });

                // Filter buttons
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.filter;
                        this.renderTasks();
                    });
                });
            }
        }

        // Initialize the app
        const taskManager = new TaskManager();
    </script>
</body>
</html>
